<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShelfScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="loginScreen" class="screen centered-screen hidden">
        <div class="auth-card">
            <h1 class="text-accent text-center font-bold mb-2">ShelfScan AI</h1>
            <p class="text-muted italic text-center mb-6">Complete shelf analysis</p>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="loginPhone" placeholder="10-digit WhatsApp number" pattern="[0-9]{10}" title="Please enter 10 digits" required>
                <button type="submit" id="loginBtn" class="w-full">Login / Register &rarr;</button>
            </form>
        </div>
    </div>

    <!-- SCREEN 2: REGISTER -->
    <div id="registerScreen" class="screen centered-screen hidden">
        <div class="auth-card">
            <button class="btn-outline mb-4" onclick="showScreen('login')">&larr; Back</button>
            <h2 class="text-accent mb-6">Register Your Store</h2>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="regOwnerName" placeholder="Owner Name" required>
                <input type="text" id="regStoreName" placeholder="Store Name" required>
                <input type="text" id="regCity" placeholder="City" required>
                <input type="text" id="regPincode" placeholder="Pincode" maxlength="6" pattern="[0-9]{6}" required>
                <select id="regStoreType" required>
                    <option value="" disabled selected>Select Store Type</option>
                    <option value="kirana">Kirana</option>
                    <option value="supermarket">Supermarket</option>
                    <option value="medical">Medical</option>
                    <option value="general">General</option>
                </select>
                <div id="regError" class="text-danger text-sm mb-4 hidden"></div>
                <button type="submit" id="regBtn" class="w-full">Register Karo &rarr;</button>
            </form>
        </div>
    </div>

    <!-- SCREEN 3: DASHBOARD -->
    <div id="dashboardScreen" class="screen hidden">
        <div class="dashboard-container">
            <div class="navbar">
                <h2 class="text-accent font-bold">📊 ShelfScan AI</h2>
                <div class="flex items-center gap-4">
                    <span id="navOwnerName" class="text-muted"></span>
                    <button class="btn-outline" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="grid-4">
                <div class="stat-card">
                    <div class="text-muted text-sm">📷 Total Scans</div>
                    <div id="statTotalScans" class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="text-muted text-sm">🏥 Health Score</div>
                    <div id="statHealthScore" class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="text-muted text-sm">🚨 Critical Items</div>
                    <div id="statCritical" class="stat-value text-danger">-</div>
                </div>
                <div class="stat-card">
                    <div class="text-muted text-sm">🕐 Last Scan</div>
                    <div id="statLastScan" class="stat-value text-muted" style="font-size: 16px; margin-top: 14px;">-</div>
                </div>
            </div>

            <div class="flex gap-4 md-row">
                <div id="scanInputSection" class="card" style="flex: 1;">
                    <h3 class="mb-4">New Scan</h3>
                    <div class="upload-zone" id="dropZone" onclick="document.getElementById('scanImage').click()">
                        <div id="dropText">📸 Drop photo here or click to select</div>
                        <img id="imagePreview" class="hidden" src="" alt="Preview">
                    </div>
                    <input type="file" id="scanImage" class="hidden" accept="image/*" onchange="handleImageSelect(event)">
                    <div id="scanProgress" class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <button id="scanBtn" class="w-full mt-4" onclick="handleScan()" disabled>🔍 Analyze</button>
                </div>

                <div id="scanResultSection" class="card hidden" style="flex: 2;">
                    <div class="flex justify-between items-center mb-6">
                        <h3>Scan Results</h3>
                        <button class="btn-outline" onclick="resetScan()">🔄 New Scan</button>
                    </div>
                    <div id="healthCircle" class="health-circle">--</div>
                    <div id="voiceContainer" class="hidden mb-6">
                        <h4 class="mb-2 text-muted">🎙️ Audio Recommendation</h4>
                        <audio id="voicePlayer" controls></audio>
                    </div>
                    <h4 class="mb-4">Detected Products</h4>
                    <div id="productsGrid" class="products-grid"></div>
                    <h4 class="mb-4 mt-6">AI Debate</h4>
                    <div id="debateContainer"></div>
                </div>
            </div>

            <div class="card mt-6">
                <h3 class="mb-4">Recent Scans</h3>
                <div id="recentScansList" class="scans-list">
                    <div class="text-muted text-center italic py-4">No scans yet</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
